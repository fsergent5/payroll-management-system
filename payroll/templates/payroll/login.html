<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  }
form {
  border-radius: 5px;
  background-color: #f2f2f2;
  padding: 20px;
}

label {display: block;}

input[type=text],input[type=password], select {
  width: 50%;
  padding: 14px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}

input[type=submit] {
  width: 50%;
  background-color: #3f8672;
  color: white;
  padding: 14px;
  margin: 8px 0;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

</style>

<div>
    <h1>Login Portal</h1>

<form method="POST">
    {% csrf_token %}
    <label for="username"> Enter Username: </label><br>
    <input type="text" id= "username" name="username"><br>
    <br>
    <label for="password"> Enter Password: </label><br>
    <input type="password" id= "password" name="password"><br>
    </br>
    <label for="department_key"> Department Key: </label><br>
    <input type="text" id= "department_key" name="department_key" required><br>
      <br>
    <input type="submit" value="Submit">
      </br>
</form>
</head>
</html>
